<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Đơn Hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">
   
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <!-- Khu vực đăng nhập ID người dùng -->
        <div class="bg-blue-600 p-4 rounded-xl mb-6 shadow-md flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <span class="text-white font-bold">ID Người Dùng:</span>
                <input type="text" id="userIdInput" placeholder="Nhập tên hoặc mã số..." 
                    class="px-3 py-1 rounded border-none outline-none text-sm w-40 text-gray-800">
                <button onclick="loginUser()" class="bg-white text-blue-600 px-4 py-1 rounded font-bold text-sm hover:bg-blue-50 transition-colors">
                    Truy cập
                </button>
            </div>
            <div id="userInfo" class="text-blue-100 text-xs font-medium italic">
                Vui lòng nhập ID để quản lý đơn hàng của bạn.
            </div>
        </div>

        <div id="mainContent" class="opacity-40 pointer-events-none transition-opacity duration-300">
            <!-- Form thêm đơn hàng -->
            <div class="form-container p-6 rounded-xl mb-12 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-blue-600">Thêm Đơn Hàng Mới</h2>
                    <div class="text-right">
                         <span class="text-[10px] text-gray-400 block uppercase font-bold">Bộ nhớ cá nhân</span>
                         <div class="w-24 h-1 bg-gray-200 rounded-full mt-1">
                             <div id="storageBar" class="h-1 bg-blue-500 rounded-full transition-all" style="width: 0%"></div>
                         </div>
                    </div>
                </div>
                <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mã đơn hàng (Order #)</label>
                        <input type="text" id="orderId" required placeholder="111-4042785-0685047 (BOSS)"
                            class="w-full px-4 py-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email PayPal</label>
                        <input type="email" id="orderEmail" required placeholder="paypal@example.com"
                            class="w-full px-4 py-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tên Người bán</label>
                        <input type="text" id="orderSeller" required placeholder="Tên người bán/Shop"
                            class="w-full px-4 py-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Giá ($)</label>
                        <input type="number" id="orderPrice" required step="0.01" placeholder="0.00"
                            class="w-full px-4 py-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Hình ảnh sản phẩm</label>
                        <input type="file" id="orderImage" accept="image/*" required
                            class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                        <p id="imgError" class="text-[10px] text-red-500 mt-1 hidden">Ảnh quá lớn (>500KB), hãy chọn ảnh nhỏ hơn.</p>
                    </div>

                    <div class="md:col-span-2 bg-blue-50 p-3 rounded-lg flex items-center space-x-6 border border-blue-100">
                        <span class="text-xs font-bold text-gray-500 uppercase">Trạng thái:</span>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="refundStatus" value="Chưa Refund" checked class="text-blue-600">
                            <span class="ml-2 text-sm text-gray-700">Chưa Refund</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="refundStatus" value="Đã Refund" class="text-green-600">
                            <span class="ml-2 text-sm text-gray-700">Đã Refund</span>
                        </label>
                    </div>

                    <div class="md:col-span-2">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-md active:scale-[0.98]">
                            Lưu Đơn Hàng
                        </button>
                    </div>
                </form>
            </div>

            <hr class="border-blue-200 mb-10">

            <!-- Danh sách đơn hàng -->
            <div id="orderList" class="space-y-10"></div>

            <div id="emptyMsg" class="hidden text-center text-gray-400 py-10">
                Danh sách đang trống. Hãy thêm đơn hàng đầu tiên.
            </div>
        </div>
    </div>

    <!-- Alert Custom (Chỉ xuất hiện khi bấm Xóa) -->
    <div id="customAlert" class="fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl max-w-sm w-full mx-4 shadow-2xl">
            <h3 class="text-lg font-bold text-red-600 mb-2">Thông báo</h3>
            <p class="text-gray-600 text-sm mb-6">Xóa đơn hàng này vĩnh viễn?</p>
            <div class="flex justify-end gap-3">
                <button id="alertClose" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg text-sm font-bold">Hủy</button>
                <button id="alertConfirm" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Xác nhận</button>
            </div>
        </div>
    </div>

     <script src="./main.js"></script>
</body>
</html>
